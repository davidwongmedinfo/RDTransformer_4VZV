# Data / preprocessing (must match the pretrained model)
kmer_size: 3   
pretrain_num_classes: 6   
max_seq_length: 2048   
# Model architecture
embedding_dim: 64  # must match the pretrained model
num_heads: 8  # must match the pretrained model
num_layers: 2  # must match the pretrained model
hidden_dim: 192  # must match the pretrained model
dropout_rate: 0.1
hidden_dim_for_binary_classifier: 64
# Batch size
batch_size: 8
# Bootstrap for final metrics
n_boot: 500
# Device 
device: "cuda:7"  # or "cpu"
# DataLoader workers
num_workers: 0
# Seed  
seed: 42
# Paths for fulltrained checkpoint, kmer vocab, label encoder class, test fasta and reference fasta
fulltrained_ckpt_path: "elisa_fulltrain_save_20251110_1337/final_model.pth"
fulltrained_kmer_json: "elisa_fulltrain_save_20251110_1337/kmer_to_idx.json"
fulltrained_le_classes_path: "elisa_fulltrain_save_20251110_1337/label_encoder_classes.json"
finetune_test_fasta: "../data/preprocessed/finetune/elisa_splits/elisa_finetune_test_set.fasta"
reference_fasta: "../data/raw/finetune/VZV-P01.fasta"
# Label type
label: "elisa"

#### command line to run elisa_test
# python finetune_test.py --config finetune_configs/elisa_test_config.yaml